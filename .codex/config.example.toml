# Example Codex config. Adapt to your local setup.

model = "gpt-5.5"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
hooks = true
route_tools = true

[projects.default]
instructions = "AGENTS.md"

[review]
instructions = "agent-pack/quality/code_review.md"

[project]
workflow = "agent-pack/workflows/landing-agent-orchestration.workflow.md"
agent_contract = "agent-pack/templates/agent-output-contract.schema.md"
guardrails = "agent-pack/guardrails/guardrails.policy.md"
approval_matrix = "agent-pack/guardrails/approval-matrix.md"
tracing_policy = "integrations/observability/tracing.policy.md"
route_config = "runtime/typescript/route.config.ts"
research_config = "runtime/typescript/research.config.ts"
hooks = "runtime/typescript/hooks.ts"
rules = ".codex/rules/safe-commands.example.toml"

[tools]
web_search = true
file_search = true
shell = true
browser = true
deep_research = false
notion = false

[research]
default_mode = "deep_research"
require_citations = true
fallback = "needs_validation"
providers = [
  "file_search",
  "user_sources",
  "openai_docs",
  "web_search",
  "browser",
  "deep_research_mcp",
  "custom_mcp"
]

[route_tools]
run_research = "research"
create_prd = "prd"
publish_prd_to_notion = "notion-publisher"
create_ia_brief = "ia"
create_design_brief = "design"
create_copy_deck = "copywriting"
generate_screens = "design-generator"
build_prototype = "prototype"
implement_frontend = "frontend"
create_test_bench = "test-bench"
run_qa_review = "qa-review"
create_release_notes = "release"

[hooks]
before_run = ".codex/hooks/README.md#before_run"
before_agent_call = ".codex/hooks/README.md#before_agent_call"
after_agent_call = ".codex/hooks/README.md#after_agent_call"
before_tool_call = ".codex/hooks/README.md#before_tool_call"
after_tool_call = ".codex/hooks/README.md#after_tool_call"
before_qa = ".codex/hooks/README.md#before_qa"
after_qa = ".codex/hooks/README.md#after_qa"
before_final = ".codex/hooks/README.md#before_final"

[rules]
safe_commands = ".codex/rules/safe-commands.example.toml"

[approval]
require_for = [
  "deploy",
  "delete",
  "external_send",
  "mass_change",
  "secrets_change",
  "connect_broad_mcp",
  "github_write",
  "gitlab_write",
  "figma_write",
  "notion_write",
  "browser_external_action"
]

[mcp_servers.playwright]
command = "yarn"
args = ["dlx", "@playwright/mcp@latest"]

[mcp_servers.github]
command = "docker"
args = [
  "run",
  "-i",
  "--rm",
  "-e",
  "GITHUB_PERSONAL_ACCESS_TOKEN",
  "-e",
  "GITHUB_READ_ONLY=1",
  "ghcr.io/github/github-mcp-server"
]

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PERSONAL_ACCESS_TOKEN}"
GITHUB_READ_ONLY = "1"

[mcp_servers.GitLab]
url = "https://gitlab.com/api/v4/mcp"

[mcp_servers.tavily]
url = "https://mcp.tavily.com/mcp/?tavilyApiKey=${TAVILY_API_KEY}"

[mcp_servers.lazyweb]
url = "https://www.lazyweb.com/mcp"
bearer_token_env_var = "LAZYWEB_MCP_TOKEN"

[mcp_servers.notion]
command = "yarn"
args = ["notion:mcp"]

[mcp_servers.notion.env]
NOTION_TOKEN = "${NOTION_TOKEN}"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.figmaDesktop]
url = "http://127.0.0.1:3845/mcp"

[profiles.safe_review]
approval_policy = "on-request"
sandbox_mode = "read-only"

[profiles.product_pipeline]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
